<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل فعاليات الجامعة الافتراضية | اتصل بنا</title>
    <!-- Bootstrap & Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-calendar-days me-2"></i> دليل فعاليات SVU
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">كل الفعاليات</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">عن الدليل</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">اتصل بنا</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <button id="darkModeToggle" class="btn btn-outline-secondary btn-sm ms-3">
                        <i class="fa-solid fa-moon"></i> وضع ليلي
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">
        <h2 class="mb-4 text-center">تواصل معنا</h2>
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card p-4 shadow-sm">
                    <form id="contactForm" novalidate>
                        <div class="mb-3">
                            <label for="nameInput" class="form-label">الاسم الكامل *</label>
                            <input type="text" class="form-control" id="nameInput" required>
                            <div class="invalid-feedback">يرجى إدخال اسمك.</div>
                        </div>
                        <div class="mb-3">
                            <label for="emailInput" class="form-label">البريد الإلكتروني *</label>
                            <input type="email" class="form-control" id="emailInput" required>
                            <div class="invalid-feedback">يرجى إدخال بريد إلكتروني صحيح.</div>
                        </div>
                        <div class="mb-3">
                            <label for="messageInput" class="form-label">الرسالة *</label>
                            <textarea class="form-control" id="messageInput" rows="5" required></textarea>
                            <div class="invalid-feedback">يرجى كتابة رسالتك قبل الإرسال.</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">إرسال الرسالة</button>
                    </form>
                    
                    <!-- رسالة التنبيه (Alert) -->
                    <div id="contactAlert" class="alert d-none mt-3" role="alert"></div>
                </div>
            </div>
            <div class="col-md-4 mt-4 mt-md-0">
                <div class="card p-4 h-100 border-0 bg-primary text-white">
                    <h4>معلومات التواصل</h4>
                    <p class="mt-3"><i class="fa-solid fa-envelope me-2"></i> info@svuonline.org</p>
                    <p><i class="fa-solid fa-phone me-2"></i> +963 11 123 4567</p>
                    <p><i class="fa-solid fa-location-dot me-2"></i> دمشق، سوريا</p>
                    <hr>
                    <h5 class="mt-3">تابعنا على:</h5>
                    <div class="d-flex gap-3 fs-4 mt-2">
                        <a href="#" class="text-white"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class="text-white"><i class="fa-brands fa-twitter"></i></a>
                        <a href="#" class="text-white"><i class="fa-brands fa-linkedin"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center text-md-start">
        <div class="container"><p class="mb-0">&copy; 2026 جميع الحقوق محفوظة لطلاب WP1HW.</p></div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
